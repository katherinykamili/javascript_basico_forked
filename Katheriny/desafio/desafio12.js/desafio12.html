<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🎬 Sistema de Cadastro de Filmes</title>

</head>

<body>
    <button type="button" id="botaoTema" class="btn-tema">
    🌙 Modo Escuro
</button>

    <div class="container">
        <header>
            <h1>🎬 Cadastro de Filmes</h1>
            <p class="subtitle">Organize seus filmes favoritos em um único lugar</p>
        </header>

        <section class="form-section">
            <h2>Adicionar Novo Filme</h2>

            <form id="formulario">
                <div class="form-group">
                    <div class="input-wrapper">
                        <label for="nome">Nome do Filme</label>
                        <input type="text" id="nome" placeholder="Ex: Homem-Aranha">
                    </div>

                    <div class="input-wrapper">
                        <label for="genero">Gênero</label>
                        <select id="genero">
                            <option value="">Selecione um gênero</option>
                            <option value="Ação">Ação</option>
                            <option value="Aventura">Aventura</option>
                            <option value="Comédia">Comédia</option>
                            <option value="Drama">Drama</option>
                            <option value="Terror">Terror</option>
                            <option value="Ficção Científica">Ficção Científica</option>
                            <option value="Romance">Romance</option>
                            <option value="Animação">Animação</option>
                        </select>
                    </div>

                    <div class="input-wrapper">
                        <label for="ano">Ano de Lançamento</label>
                        <input type="number" id="ano" placeholder="Ex: 2024" min="1900" max="2100">
                    </div>
                </div>

                <!-- Botão para cadastrar o filme -->
                <button type="button" class="btn-cadastrar" id="botaoCadastrar">
                    ➕ Cadastrar Filme
                </button>

                <div id="mensagemValidacao"></div>
            </form>
        </section>

        <!-- SEÇÃO DE FILMES CADASTRADOS -->
        <section class="movies-section">
            <h2>Filmes Cadastrados</h2>
            <!-- Contador de filmes -->
            <div class="counter">
                Filmes cadastrados: <span id="contador">0</span>
            </div>

            <!-- Container para os cards dos filmes -->
            <div id="listaFilmes" class="movies-container">
                <!-- Mensagem de lista vazia -->
                <div class="empty-state">
                    <div class="emoji">🍿</div>
                    <p>Nenhum filme cadastrado ainda. Comece adicionando seus filmes favoritos!</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
